# config/strategy.yaml
# THE ONLY FILE THE AUTORESEARCH LOOP MAY MODIFY
# All values must stay within the bounds defined in loops/program.md

indicators:
  rsi:
    period: 14          # bounds: [7, 30]
    overbought: 69      # bounds: [60, 85]
    oversold: 22        # bounds: [15, 40]
  macd:
    fast: 12            # bounds: [5, 21]
    slow: 26            # bounds: [15, 50]
    signal: 9           # bounds: [5, 15]
  bollinger:
    period: 20          # bounds: [10, 30]
    std: 1.5            # bounds: [1.5, 3.0]
  sma_fast: 20          # bounds: [10, 30]
  sma_slow: 50          # bounds: [30, 100]
  ema_fast: 9           # bounds: [5, 21] — EMA crossover fast period
  ema_slow: 21          # bounds: [10, 50] — EMA crossover slow period
  volume_lookback: 20   # bounds: [10, 30]

signal:
  min_confidence: 0.6   # bounds: [0.4, 0.9]
  buy_threshold: 0.15   # bounds: [0.05, 0.4] — ensemble score to trigger BUY
  sell_threshold: -0.15  # bounds: [-0.4, -0.05] — ensemble score to trigger SELL
  volume_filter: true   # bool
  volume_multiplier: 1.5 # bounds: [1.0, 3.0]

position_sizing:
  risk_per_trade_pct: 2.0     # bounds: [0.5, 5.0] — % of portfolio per trade
  cash_reserve_pct: 10.0      # bounds: [5.0, 30.0] — % of cash to keep as reserve
  stop_loss_pct: 5.0          # bounds: [2.0, 10.0] — hard stop-loss % from entry
  take_profit_pct: 10.0       # bounds: [3.0, 25.0] — hard take-profit % from entry
  stop_loss_vol_mult: 2.0     # bounds: [0.5, 4.0] — stop = entry - N * daily_vol
  take_profit_vol_mult: 4.0   # bounds: [1.0, 8.0] — TP = entry + N * daily_vol

timeframe: "1h"         # allowed: ["15m", "30m", "1h", "4h"]

# --- Strategy mode for v2 eval harness ---
# allowed: ["rsi", "ensemble", "multi_confirm", "momentum", "squeeze", "vwap", "vwap_rsi", "squeeze_vwap"]
strategy_mode: "vwap_rsi"

# Multi-indicator confirmation (strategy_mode = "multi_confirm")
multi_confirm:
  require_agree: 2         # bounds: [2, 5] — how many indicators must agree

# Momentum breakout (strategy_mode = "momentum")
momentum:
  breakout_period: 10      # bounds: [5, 50] — look back N candles for high/low
  volume_confirm: 1.5      # bounds: [1.0, 3.0] — require Nx average volume
  trailing_stop_pct: 2.0   # bounds: [1.0, 10.0] — trailing stop %

# Bollinger squeeze breakout (strategy_mode = "squeeze")
squeeze:
  width_threshold: 0.03    # bounds: [0.01, 0.06] — BB width below this = squeeze
  squeeze_candles: 3       # bounds: [3, 15] — consecutive candles in squeeze

# VWAP reversion (strategy_mode = "vwap") — BEST STRATEGY
vwap:
  deviation_pct: 2.45      # bounds: [0.5, 5.0] — % deviation from VWAP to trigger
  window: 24               # bounds: [12, 96] — rolling VWAP window (candles)
  rsi_oversold: 44         # bounds: [20, 45] — RSI confirmation for buy
  rsi_overbought: 70       # bounds: [55, 80] — RSI confirmation for sell

# Hybrid VWAP entry + RSI exit (strategy_mode = "vwap_rsi")
vwap_rsi:
  entry_deviation: 2.75    # bounds: [0.5, 5.0] — VWAP deviation for entry
  vwap_window: 24          # bounds: [12, 96]
  entry_rsi: 42            # bounds: [20, 45] — RSI < this to enter
  exit_rsi: 72             # bounds: [55, 85] — RSI > this to exit

# Squeeze entry + VWAP exit (strategy_mode = "squeeze_vwap")
squeeze_vwap:
  width_threshold: 0.03    # bounds: [0.01, 0.06]
  squeeze_candles: 3       # bounds: [3, 15]
  vwap_window: 24          # bounds: [12, 96]
  stop_pct: 3.0            # bounds: [1.0, 8.0] — stop loss %
