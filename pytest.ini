[tool:pytest]
# Pytest configuration for crypto trading bot
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests that take more than 5 seconds
    benchmark: Performance benchmark tests
    database: Tests that require database
    external_api: Tests that call external APIs
    redis: Tests that require Redis

# Async support
asyncio_mode = auto

# Coverage settings
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    --maxfail=1
    -ra

# Test discovery
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg

# Ignore deprecation warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning:binance.*
    ignore::DeprecationWarning:ccxt.*
    ignore::PendingDeprecationWarning

# Timeout for tests
timeout = 300  # 5 minutes max per test
